CR-ACCOUNT-20260706-002:
  class: A
  position: 账户状态类主规则候选
  action: 保留，进入账户类重点验证池
  merge_target:
  merge_watch:
    - CR-ACCOUNT-20260706-001｜禁止同步他人仓位操作
    - CR-ACCOUNT-20260706-003｜风险敞口承受力由账户状态决定
  formal_candidate: true
  formal_rule_suggestion: ACCOUNT-001｜账户状态决定仓位力度
  promote_blockers:
    - 账户状态字段未量化
    - 仓位力度对应关系未明确
